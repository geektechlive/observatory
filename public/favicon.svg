<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Option A: Reticle Globe — earth disc + equatorial arc + gap crosshair + center pip -->
  <defs>
    <radialGradient id="ga" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1c1a12"/>
      <stop offset="100%" stop-color="#080706"/>
    </radialGradient>
    <clipPath id="ca"><circle cx="16" cy="16" r="13"/></clipPath>
  </defs>
  <!-- Outer void -->
  <circle cx="16" cy="16" r="16" fill="#09080a"/>
  <!-- Globe disc -->
  <circle cx="16" cy="16" r="13" fill="url(#ga)" stroke="#9a6820" stroke-width="0.9"/>
  <!-- Equatorial band -->
  <ellipse cx="16" cy="16" rx="13" ry="4.2" fill="none" stroke="#9a6820" stroke-width="0.6" opacity="0.6" clip-path="url(#ca)"/>
  <!-- Meridian hint -->
  <ellipse cx="16" cy="16" rx="4.2" ry="13" fill="none" stroke="#9a6820" stroke-width="0.4" opacity="0.35" clip-path="url(#ca)"/>
  <!-- Crosshair arms (gap around center) -->
  <line x1="3" y1="16" x2="12" y2="16" stroke="#38d8f0" stroke-width="1"/>
  <line x1="20" y1="16" x2="29" y2="16" stroke="#38d8f0" stroke-width="1"/>
  <line x1="16" y1="3" x2="16" y2="12" stroke="#38d8f0" stroke-width="1"/>
  <line x1="16" y1="20" x2="16" y2="29" stroke="#38d8f0" stroke-width="1"/>
  <!-- Center pip -->
  <circle cx="16" cy="16" r="1.8" fill="#38d8f0"/>
</svg>
